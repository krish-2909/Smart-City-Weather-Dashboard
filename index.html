<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .location h2 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
    .location p { font-size: 13px; color: #888; margin-top: 4px; }
    .condition img { width: 48px; height: 48px; }
    .condition p { font-size: 13px; color: #888; text-align: right; margin-top: 4px; }
    .temp-main { margin-bottom: 8px; display: flex; align-items: baseline; gap: 12px; }
    .temp-main .c { font-size: 48px; font-weight: 600; color: #1a1a1a; }
    .temp-main .f { font-size: 20px; color: #999; }
    .feels { font-size: 13px; color: #999; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid #eee; padding-top: 16px; }
    .stat { background: #f7f9fb; border-radius: 10px; padding: 12px; }
    .stat .label { font-size: 12px; color: #999; margin-bottom: 4px; }
    .stat .value { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .footer { display: flex; justify-content: space-between; font-size: 12px; color: #bbb; border-top: 1px solid #eee; padding-top: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div style="width: 100%; max-width: 420px;">
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <input type="text" id="city-input" placeholder="Search city..." style="flex: 1; padding: 12px 16px; border-radius: 10px; border: 2px solid #cbd5e1; font-size: 0.95rem; outline: none;" />
      <button onclick="handleSearch()" style="padding: 12px 22px; border-radius: 10px; border: none; background: #3b82f6; color: white; cursor: pointer; font-size: 0.95rem; font-weight: 700;">Search</button>
    </div>
    <div class="card" id="weather-card" style="display: none;">Loading...</div>
  </div>

  <script src="index.js"></script>
</body>
</html>
